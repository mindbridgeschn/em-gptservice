# Updated values for DB Service
# Compatible with enhanced Helm chart templates

# Namespace where resources will be deployed
namespace: dev-em

# Deployment naming suffix (empty means just Release.Name will be used as suffix)
deploymentNameSuffix: ""

# Number of replicas (ignored when HPA is enabled)
replicaCount: 1

# Git metadata labels
git:
  author: "{git-author}"
  commitHash: "{commitHash10}"
  jenkinsUser: "{jenkins-user}"

# Autoscaling flag (used to control replica count rendering)
autoscaling:
  enabled: false

# Horizontal Pod Autoscaler configuration
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  annotations: { }
  behavior: { }
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

# Revision history limit for deployments
revisionHistoryLimit:
  enabled: true
  limit: 6

# Deployment strategy configuration
strategy:
  enabled: true
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

# Multiple containers support - DISABLED
containers:
  enabled: false
  list: [ ]

# Single container image configuration
image:
  repository: myrepo/myapp
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Image pull secrets
imagePullSecrets:
  - name: acr-secret

# Container security context
securityContext:
  enabled: false
  context: { }

# Pod security context
podSecurityContext:
  enabled: false
  context: { }

# Restart policy for pods
restartPolicy:
  enabled: true
  policy: Always

# Environment variables
env:
  enabled: true
  variables:
    # --- Secrets (from Kubernetes Secret) ---
    - name: AZURE_API_KEY
      valueFrom:
        secretKeyRef:
          name: em-gpt-secret
          key: AZURE_API_KEY
    - name: azure_endpoint
      valueFrom:
        secretKeyRef:
          name: em-gpt-secret
          key: azure_endpoint
    - name: REDIS_PASSWORD
      valueFrom:
        secretKeyRef:
          name: em-gpt-secret
          key: REDIS_PASSWORD
    - name: API_TOKEN
      valueFrom:
        secretKeyRef:
          name: em-gpt-secret
          key: API_TOKEN
    # --- Redis ---
    - name: REDIS_HOST
      value: "redis"
    - name: REDIS_PORT
      value: "6379"
    - name: REDIS_SSL
      value: "false"
    - name: REDIS_TTL
      value: "36000"
    # --- EM Worker ---
    - name: SEND
      value: "http://backend-service:8085/em/test/single-format/ai-response"
    # --- OCR Searchable ---
    - name: OCR_URL
      value: "https://stage.rustocr.innoura.com/convert-upload"
    - name: OCR_BACKEND_URL
      value: "http://backend-service:8085/em/ocr-response"
    # --- OCR Text Pipeline ---
    - name: OCR_ENGINE_URL
      value: "https://emcodeai.ocr.oncoauth.com/ocr"
    - name: OCR_STATUS_URL
      value: ""
    - name: DEMO_URL
      value: ""
    - name: ADD_TASK_URL
      value: ""
    # --- Demo / PII ---
    - name: DEMO_URL_BACKEND
      value: "http://backend-service:8085/em/demo-response"
    # --- Telemetry ---
    - name: OTEL_SERVICE_NAME
      value: "em-worker"
    - name: OTEL_TRACES_EXPORTER
      value: "otlp"
    # --- Startup ---
    - name: FLUSH_REDIS_ON_STARTUP
      value: "false"
    - name: FLUSH_EM_ON_STARTUP
      value: "false"
    - name: FLUSH_OCR_ON_STARTUP
      value: "false"

# Health probes configuration
probes:
  liveness:
    enabled: true
    config:
      httpGet:
        path: /health/liveness
        port: 8000
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
  readiness:
    enabled: true
    config:
      httpGet:
        path: /health/readiness
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  startup:
    enabled: true
    config:
      httpGet:
        path: /health/startup
        port: 8000
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 30

# Resource limits and requests
resources:
  enabled: true
  config:
    limits:
      cpu: "2"
      memory: 32Gi
    requests:
      cpu: "2"
      memory: 32Gi

# Volume mounts
volumeMounts:
  enabled: false
  mounts:
    - name: app-volume
      mountPath: /mnt/data

# Volumes
volumes:
  enabled: false
  volumes:
    - name: app-volume
      emptyDir: { }

# Node selector
nodeSelector:
  enabled: false
  labels:
    cloud.google.com/gke-nodepool: spot-node-pool

# Affinity rules
affinity:
  enabled: false
  config: { }

# Tolerations for pod assignment  <-- UPDATED
tolerations:
  enabled: true
  tolerations:
    - key: "workload"
      operator: "Equal"
      value: "spotworkload"
      effect: "NoSchedule"

# Service account configuration
serviceAccount:
  enabled: false
  name: ""
  annotations: { }
  secrets: [ ]
  imagePullSecrets: [ ]

# Pod labels
podLabels: { }

# Pod annotations
podAnnotations: { }

# Service configuration
service:
  enabled: true
  name: http
  type: ClusterIP
  port: 8000
  targetPort: 8000
  protocol: TCP
  annotations:
    prometheus.io/scrape: "false"
    prometheus.io/path: "/em/actuator/prometheus"
    prometheus.io/port: "8085"

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    cert-manager.io/cluster-issuer: dev-em-gt
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      if ($request_uri = "/") {
        return 302 /docs;
      }
  hosts:
    - host: devem.gt.encipherhealth.com
      paths:
        - path: /(.*)
          pathType: Prefix
          service:
            name: emgpt-service
            port: 8000
  tls:
    - hosts:
        - devem.gt.encipherhealth.com
      secretName: dev-em-gt

# Pod Disruption Budget
pdb:
  enabled: false
  annotations: { }
  minAvailable: 1
  maxUnavailable: null

# ConfigMap configuration
configmap:
  enabled: false
  annotations: { }
  data: { }

# PVC configuration
pvc:
  enabled: false
  annotations: { }
  accessModes:
    - ReadWriteOnce
  storage: "10Gi"
  storageClassName: ""
  volumeMode: ""

# Secret configuration
secret:
  enabled: false
  annotations: { }
  type: Opaque
  data: { }

# HTTPRoute configuration
httpRoute:
  enabled: false
  annotations: { }
  parentRefs: [ ]
  hostnames: [ ]
  rules: [ ]

# ServiceMonitor configuration
serviceMonitor:
  enabled: false
  annotations:
    prometheus.io/scrape: "true"
  namespaces:
    - dev-em
  endpoints:
    - port: "http"
      path: /em/actuator/prometheus
      interval: 15s
      scrapeTimeout: 5s
      scheme: http
      params: { }
      relabelings: [ ]

# Init containers configuration
initContainers:
  enabled: false
  defaultSecurityContext: { }
  containers:
    - name: init-volume
      image: busybox
      command:
        - "sh"
        - "-c"
        - |
          mkdir -p /mnt/data/gclogs /mnt/data/inputFiles/decrypted /mnt/data/outputFiles && \
          chmod -R 777 /mnt/data/gclogs /mnt/data/inputFiles /mnt/data/outputFiles
      volumeMounts:
        - name: app-volume
          mountPath: /mnt/data
